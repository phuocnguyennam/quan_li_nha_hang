services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: restaurant_sql_db
    env_file:
      - .env.docker
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "$$MSSQL_SA_PASSWORD", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_backend
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./Eleven2Eleven_RMS
      dockerfile: Dockerfile
    container_name: restaurant_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  mssql_data:
