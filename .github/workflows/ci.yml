name: Continuous Integration (CI)

on:
  push:
    branches:
      - main

env:
  OWNER: phuocnguyennam

jobs:
  test:
    name: Code Scan & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử commit để Gitleaks quét đầy đủ

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Eleven2Eleven_RMS/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./Eleven2Eleven_RMS
        run: npm ci

      - name: Run Frontend Lint Check
        working-directory: ./Eleven2Eleven_RMS
        run: npm run lint

  build-and-push:
    name: Build & Push to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/restaurant-backend:latest
            ghcr.io/${{ env.OWNER }}/restaurant-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./Eleven2Eleven_RMS
          file: ./Eleven2Eleven_RMS/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/restaurant-frontend:latest
            ghcr.io/${{ env.OWNER }}/restaurant-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
